name: Feature Request
description: Suggest a focused Nightshift improvement.
title: "[Feature]: "
labels: ["enhancement", "triage"]
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        Nightshift is meant to stay lightweight, event-driven, and tightly scoped around sleep-based world progress. Requests should stay focused on that goal.

  - type: dropdown
    id: feature_area
    attributes:
      label: Feature Area
      options:
        - Sleep trigger behavior
        - Furnace support
        - Campfire support
        - Crop support
        - Config or hot reload
        - Compatibility
        - Performance or safety
        - Documentation
        - Other
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem or Use Case
      description: What practical problem would this solve?
      placeholder: "Explain the pain point or missing capability."
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed Solution
      description: Describe the feature as simply as possible.
      placeholder: "Explain what you want Nightshift to do."
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Optional. Mention workarounds or other approaches you considered.

  - type: dropdown
    id: importance
    attributes:
      label: Importance
      options:
        - Nice to have
        - Useful for many players
        - Important for servers or modpacks
        - Critical to Nightshift's core experience
    validations:
      required: true

  - type: checkboxes
    id: checklist
    attributes:
      label: Scope Check
      options:
        - label: This request fits Nightshift's goal of restrained overnight progress without turning sleep into a global tick accelerator.
          required: true
        - label: This request does not depend on unrelated systems like commands, networking, custom GUIs, or forced chunk loading unless clearly justified.
          required: true
